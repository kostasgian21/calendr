<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Meeting Poll</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* (The CSS remains exactly the same as before) */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --text: #0f172a;
            --border: #e2e8f0;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.5;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
        }
        h1, h2 { margin-top: 0; }
        input[type="text"] {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 0.75rem;
            text-align: center;
        }
        th { background-color: #f1f5f9; }
        input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .result-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }
        .result-item:last-child { border-bottom: none; }
		
		.vote-count {
            font-size: 0.8rem;
            color: #475569;
            background: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            display: block;
            margin: 0.4rem auto 0 auto;
            width: fit-content;
            cursor: help; /* Changes the mouse to a question mark on hover */
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Schedule a Meeting</h1>
        <p>Enter your name and select all the times you are available.</p>
        
        <input type="text" id="voterName" placeholder="Your Name (e.g., Alex)" required>
        
        <table id="pollTable">
            <thead id="tableHead">
                </thead>
            <tbody id="tableBody">
                </tbody>
        </table>

        <button id="submitBtn" onclick="submitVote()">Submit Availability</button>
    </div>

    <div class="card">
        <h2>Current Results</h2>
        <div id="resultsContainer">
            <p>Loading votes from database...</p>
        </div>
    </div>

 <script>
        // REPLACE WITH YOUR SUPABASE CREDENTIALS
        const SUPABASE_URL = 'https://ueroccscvjfvmufjxwre.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlcm9jY3Njdmpmdm11Zmp4d3JlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzODUwMjEsImV4cCI6MjA5NTk2MTAyMX0.rsGF_44kiazj8DL54E65ZVnm4nqqy1OxDKe49OCB6Ds';

        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let POLL_DAYS = [];
        let POLL_SLOTS = [];
        let votesDB = [];

        // --- 1. NEW: FETCH CONFIGURATION FIRST ---
        async function initApp() {
            const { data: configData, error: configError } = await db.from('poll_config').select('*').limit(1);
            
            if (configError || !configData || configData.length === 0) {
                document.getElementById('resultsContainer').innerHTML = "<p>Error loading poll configuration.</p>";
                return;
            }

            // Set our dynamic variables from the database
            POLL_DAYS = configData[0].days || [];
            POLL_SLOTS = configData[0].slots || [];

            if (POLL_DAYS.length === 0) {
                document.getElementById('resultsContainer').innerHTML = "<p>Waiting for admin to set up the poll...</p>";
                return;
            }

            renderTable();
            fetchVotes();
        }

        // --- 2. BUILD TABLE (Same as before) ---
        // --- 2. BUILD TABLE WITH VOTE COUNTS ---
        function renderTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');

            // Pre-calculate the vote counts for easy lookup
            const slotCounts = {};
            votesDB.forEach(vote => {
                vote.slots.forEach(slot => {
                    if (!slotCounts[slot]) slotCounts[slot] = [];
                    slotCounts[slot].push(vote.name);
                });
            });

            // Build Header
            let headerHTML = '<tr><th>Time</th>';
            POLL_DAYS.forEach(day => headerHTML += `<th>${day}</th>`);
            headerHTML += '</tr>';
            thead.innerHTML = headerHTML;

            // Build Body
            let bodyHTML = '';
            POLL_SLOTS.forEach(slot => {
                bodyHTML += `<tr><td><strong>${slot}</strong></td>`;
                POLL_DAYS.forEach(day => {
                    const checkboxValue = `${day} - ${slot}`;
                    const voters = slotCounts[checkboxValue] || [];
                    
                    let countHTML = '';
                    if (voters.length > 0) {
                        // The 'title' attribute creates the native hover tooltip!
                        countHTML = `<span class="vote-count" title="Available: ${voters.join(', ')}">
                                        ${voters.length} 👤
                                     </span>`;
                    }

                    bodyHTML += `
                        <td>
                            <input type="checkbox" value="${checkboxValue}">
                            ${countHTML}
                        </td>`;
                });
                bodyHTML += `</tr>`;
            });
            tbody.innerHTML = bodyHTML;
        }

        // --- 3. FETCH VOTES ---
        async function fetchVotes() {
            const { data, error } = await db.from('meeting_votes').select('*');
            if (error) return;
            
            votesDB = data;
            
            // Re-render both the results list AND the table so the badges show up!
            renderTable(); 
            renderResults();
        }

        // --- 4. SUBMIT VOTE (Same as before) ---
        async function submitVote() {
            const nameInput = document.getElementById('voterName').value.trim();
            if (!nameInput) { alert("Please enter your name!"); return; }

            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            const availableSlots = Array.from(checkboxes).map(cb => cb.value);

            if (availableSlots.length === 0) { alert("Please select at least one time slot!"); return; }

            const btn = document.getElementById('submitBtn');
            btn.innerText = "Saving..."; btn.disabled = true;

            const { error } = await db.from('meeting_votes').insert([{ name: nameInput, slots: availableSlots }]);

            btn.innerText = "Submit Availability"; btn.disabled = false;

            if (error) {
                alert("There was an error saving your vote.");
            } else {
                document.getElementById('voterName').value = '';
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                alert("Thanks for voting!");
                fetchVotes(); 
            }
        }

        // --- 5. RENDER RESULTS (Same as before) ---
        function renderResults() {
            const container = document.getElementById('resultsContainer');
            if (votesDB.length === 0) { container.innerHTML = "<p>No votes yet.</p>"; return; }

            const slotCounts = {};
            votesDB.forEach(vote => {
                vote.slots.forEach(slot => {
                    if (!slotCounts[slot]) slotCounts[slot] = [];
                    slotCounts[slot].push(vote.name);
                });
            });

            const sortedSlots = Object.entries(slotCounts).sort((a, b) => b[1].length - a[1].length);

            let html = "";
            for (const [slot, names] of sortedSlots) {
                html += `
                    <div class="result-item">
                        <strong>${slot}</strong> - ${names.length} vote(s)<br>
                        <span style="font-size: 0.9em; color: #64748b;">Available: ${names.join(', ')}</span>
                    </div>`;
            }
            container.innerHTML = html;
        }

        // START THE APP
        initApp();
    </script>
</body>
</html>
